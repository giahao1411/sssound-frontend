image: node:20

stages:
    - install
    - build
    - deploy

cache:
    paths:
        - node_modules/

install:
    stage: install
    script:
        - npm install

build:
    stage: build
    script:
        - npm run build

deploy:
    stage: deploy
    script:
        - npm install -g vercel
        - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        - vercel build --prod --token=$VERCEL_TOKEN
        - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
    only:
        - main
